<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Tic Tac Toe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            color: #333;
        }

        #game-container {
            text-align: center;
            width: 80%;
            max-width: 500px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        #main-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .sub-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
            width: 100%;
            height: 100%;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease-in-out;
            cursor: pointer;
        }

        .sub-board:hover {
            transform: scale(1.05);
        }

        .sub-board.locked {
            opacity: 0.5;
            pointer-events: none;
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            font-size: 2rem;
            background-color: #f1f1f1;
            border-radius: 8px;
            transition: background-color 0.3s;
        }

        .cell.X {
            color: #e63946;
        }

        .cell.O {
            color: #1d3557;
        }

        .cell.highlight {
            background-color: rgba(255, 193, 7, 0.5);
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            margin-top: 20px;
            background-color: #2d6a4f;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #1e4f3d;
        }

        @media screen and (max-width: 768px) {
            #game-container {
                width: 90%;
            }

            h1 {
                font-size: 1.5rem;
            }

            #main-board {
                grid-template-columns: repeat(1, 1fr);
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>Ultimate Tic Tac Toe</h1>
        <div id="main-board">
            <!-- La grille sera générée dynamiquement avec JavaScript -->
        </div>
        <button id="reset-button">Réinitialiser</button>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const mainBoard = document.getElementById('main-board');
            let currentPlayer = 'X';  // Le joueur X commence
            let gameState = Array(9).fill(null);  // 9 sous-grilles

            // Initialisation de la grille
            function createBoard() {
                mainBoard.innerHTML = '';
                gameState.forEach((_, index) => {
                    const subBoard = document.createElement('div');
                    subBoard.classList.add('sub-board');
                    subBoard.dataset.index = index;
                    subBoard.addEventListener('click', () => handleSubBoardClick(index));

                    for (let i = 0; i < 9; i++) {
                        const cell = document.createElement('div');
                        cell.classList.add('cell');
                        cell.dataset.cellIndex = i;
                        cell.addEventListener('click', (e) => handleCellClick(e, index, i));
                        subBoard.appendChild(cell);
                    }
                    mainBoard.appendChild(subBoard);
                });
            }

            // Gérer un clic sur une sous-grille
            function handleSubBoardClick(index) {
                if (gameState[index].locked) return;  // Ne pas jouer dans une sous-grille déjà remplie

                // Cacher les sous-grilles non jouables
                const subBoards = document.querySelectorAll('.sub-board');
                subBoards.forEach((board, idx) => {
                    if (gameState[idx]?.locked) {
                        board.classList.add('locked');
                    } else {
                        board.classList.remove('locked');
                    }
                });

                // Effectuer le mouvement dans la sous-grille
                const cells = subBoards[index].getElementsByClassName('cell');
                const moveIndex = findEmptyCell(cells);
                if (moveIndex !== -1) {
                    makeMove(index, moveIndex);
                }
            }

            // Trouver une cellule vide dans la sous-grille
            function findEmptyCell(cells) {
                for (let i = 0; i < cells.length; i++) {
                    if (!cells[i].textContent) {
                        return i;
                    }
                }
                return -1;
            }

            // Effectuer un mouvement
            function makeMove(subBoardIndex, cellIndex) {
                const subBoard = document.querySelectorAll('.sub-board')[subBoardIndex];
                const cell = subBoard.getElementsByClassName('cell')[cellIndex];
                if (cell.textContent === '') {
                    cell.textContent = currentPlayer;
                    cell.classList.add(currentPlayer);

                    checkWinner(subBoardIndex);  // Vérifier si la sous-grille est gagnée

                    // Passer à l'autre joueur
                    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
                }
            }

            // Vérifier si une sous-grille a gagné
            function checkWinner(subBoardIndex) {
                const subBoard = document.querySelectorAll('.sub-board')[subBoardIndex];
                const cells = subBoard.getElementsByClassName('cell');
                const winPatterns = [
                    [0, 1, 2], [3, 4, 5], [6, 7, 8],  // Lignes
                    [0, 3, 6], [1, 4, 7], [2, 5, 8],  // Colonnes
                    [0, 4, 8], [2, 4, 6]  // Diagonales
                ];

                for (let pattern of winPatterns) {
                    const [a, b, c] = pattern;
                    if (cells[a].textContent && cells[a].textContent === cells[b].textContent && cells[a].textContent === cells[c].textContent) {
                        alert(`${cells[a].textContent} a gagné cette sous-grille !`);
                        gameState[subBoardIndex] = { locked: true };  // Verrouiller la sous-grille gagnée
                        return;
                    }
                }
            }

            // Réinitialiser le jeu
            document.getElementById('reset-button').addEventListener('click', () => {
                gameState = Array(9).fill(null);
                createBoard();
                currentPlayer = 'X';  // Recommencer avec X
            });

            createBoard();
        });
    </script>
</body>
</html>
